name: Desktop Release Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/desktop-companion/**"
      - "packages/shared/**"
      - "tools/verification/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release-desktop.yml"

jobs:
  windows:
    name: Windows Artifacts
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

      - run: npm run package:win:bundle

      - uses: actions/upload-artifact@v4
        with:
          name: scratch-desktop-companion-windows
          path: installers/**
          if-no-files-found: error

  macos:
    name: macOS Artifacts
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

      - run: npm run package:mac

      - run: npm run package:mac:dmg

      - uses: actions/upload-artifact@v4
        with:
          name: scratch-desktop-companion-macos
          path: installers/**
          if-no-files-found: error
