name: Bug Report
description: 报告可复现的缺陷 / Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息，便于 Windows / macOS 双平台排查。
  - type: dropdown
    id: platform
    attributes:
      label: 平台 / Platform
      options:
        - Windows
        - macOS
        - Both
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式 / Install Method
      options:
        - Source build
        - Windows portable exe
        - Windows installer exe
        - macOS zip
        - macOS dmg
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 问题概述 / Summary
      description: 用 1-3 句话说明发生了什么，以及你原本期望什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Reproduction Steps
      description: 按顺序写清楚触发过程。
      placeholder: |
        1. 打开伴随程序
        2. 选择 Scratch 路径
        3. 点击“打开已选 Scratch”
        4. ...
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: 实际结果 / Actual Result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected Result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图 / Logs or Screenshots
      description: 如有日志路径、报错文本、截图，请贴在这里。
