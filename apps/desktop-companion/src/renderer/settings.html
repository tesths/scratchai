<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DeepSeek 设置</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #edf2f7;
        --panel: #ffffff;
        --panel-muted: #f7f9fc;
        --line: #d7dee8;
        --ink: #1f2937;
        --muted: #667085;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --accent-soft: #dbeafe;
        --warn: #b45309;
        --warn-soft: #ffedd5;
        --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        --shell-radius: 22px;
        --panel-radius: 16px;
        --card-radius: 12px;
        --control-radius: 10px;
        --text-title: 22px;
        --text-h2: 15px;
        --text-body: 13px;
        --text-note: 12px;
        --text-mini: 11px;
        --control-height: 34px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 14px;
        font-family:
          "Segoe UI Variable Text",
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei UI",
          sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.72)),
          linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .shell {
        min-height: calc(100vh - 36px);
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--shell-radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      .hero {
        display: grid;
        gap: 4px;
      }

      .eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        font-size: var(--text-title);
        line-height: 1.12;
        font-weight: 650;
      }

      .hero-copy,
      .note,
      #settings-feedback,
      #settings-error {
        font-size: var(--text-note);
        line-height: 1.55;
        color: var(--muted);
      }

      .status-pill {
        width: fit-content;
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: var(--text-mini);
        font-weight: 650;
      }

      .panel {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--panel-radius);
        background: var(--panel);
      }

      .panel h2 {
        font-size: var(--text-h2);
        font-weight: 650;
      }

      .meta-grid {
        display: grid;
        gap: 8px;
      }

      .meta-card {
        display: grid;
        gap: 5px;
        padding: 10px 12px;
        border-radius: var(--card-radius);
        background: var(--panel-muted);
        border: 1px solid var(--line);
      }

      .meta-card span {
        font-size: var(--text-mini);
        color: var(--muted);
      }

      .meta-card strong {
        font-size: var(--text-body);
        line-height: 1.45;
        font-weight: 600;
        word-break: break-word;
      }

      input[type="password"] {
        width: 100%;
        min-height: var(--control-height);
        border: 1px solid var(--line);
        border-radius: var(--control-radius);
        padding: 0 12px;
        font: inherit;
        font-size: var(--text-note);
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .button {
        display: inline-flex;
        min-height: var(--control-height);
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: var(--control-radius);
        padding: 0 12px;
        font: inherit;
        font-size: var(--text-note);
        font-weight: 600;
        line-height: 1;
        cursor: pointer;
      }

      .button.primary {
        background: var(--accent);
        color: #fff;
        box-shadow: inset 0 -1px 0 rgba(15, 23, 42, 0.14);
      }

      .button.primary:hover {
        background: var(--accent-strong);
      }

      .button.secondary {
        background: #fff;
        color: var(--ink);
        border-color: var(--line);
      }

      .button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      #settings-feedback[data-kind="success"] {
        color: var(--accent-strong);
      }

      #settings-feedback[data-kind="error"],
      #settings-error {
        color: var(--warn);
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }

        .shell {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">DeepSeek Settings</p>
        <h1>本地 API Key 配置</h1>
        <p class="hero-copy">
          这里仅保存当前电脑要使用的 DeepSeek API Key。首页不展示这些技术配置，只保留学习流程。
        </p>
        <p id="settings-status" class="status-pill">正在读取当前配置…</p>
      </section>

      <section class="panel">
        <h2>当前状态</h2>
        <p id="settings-config-summary" class="note">正在同步当前 DeepSeek 配置来源。</p>
        <div class="meta-grid">
          <div class="meta-card">
            <span>当前来源</span>
            <strong id="settings-current-source">正在读取…</strong>
          </div>
          <div class="meta-card">
            <span>当前模型</span>
            <strong id="settings-current-model">正在读取…</strong>
          </div>
          <div class="meta-card">
            <span>程序自带配置文件</span>
            <strong id="settings-config-path">正在读取…</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>自定义 API Key</h2>
        <p class="note">只在当前电脑本地保存。保存后优先使用这里的 Key；清除后回退到环境变量和程序自带配置。</p>
        <input
          id="settings-custom-ai-api-key"
          type="password"
          placeholder="输入 DeepSeek API Key"
        />
        <div class="action-row">
          <button id="settings-save-custom-ai-api-key-button" class="button primary" type="button">保存 Key</button>
          <button id="settings-clear-custom-ai-api-key-button" class="button secondary" type="button">清除 Key</button>
        </div>
        <p id="settings-feedback" hidden></p>
        <p id="settings-error" hidden></p>
      </section>
    </main>
    <script type="module" src="./settings-renderer.js"></script>
  </body>
</html>
